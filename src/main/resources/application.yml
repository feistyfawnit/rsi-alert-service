spring:
  application:
    name: rsi-alert-service
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rsi_alerts}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

rsi:
  period: 14
  oversold-threshold: 30
  overbought-threshold: 70
  
  polling:
    interval-seconds: 60

  cooldown-minutes: 120
  watch-proximity-threshold: ${WATCH_PROXIMITY_THRESHOLD:40}

  quiet-hours:
    enabled: true
    start-hour: 22
    end-hour: 8
    suppress-partials-on-weekends: true

  market-hours:
    ig-start-utc: 8
    ig-end-utc: 22

  partial-monitoring:
    enabled: ${PARTIAL_MONITORING_ENABLED:true}
    window-minutes: ${PARTIAL_MONITORING_WINDOW:120}
    follow-up-interval-minutes: ${PARTIAL_MONITORING_INTERVAL:15}

  demo:
    account-balance: 10000
    account-currency: EUR
    risk-percent: 1
    stop-percent-crypto: 2.0
    stop-percent-index: 0.5
    stop-percent-commodity: 1.0
    
  timeframes:
    - 1m
    - 5m
    - 1h
    - 4h
    - 1d

market:
  binance:
    base-url: https://api.binance.com

  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: https://finnhub.io/api/v1

  ig:
    enabled: ${IG_ENABLED:false}
    api-key: ${IG_API_KEY:}
    username: ${IG_USERNAME:}
    password: ${IG_PASSWORD:}
    base-url: ${IG_BASE_URL:https://demo-api.ig.com/gateway/deal}

claude:
  enabled: ${CLAUDE_ENABLED:false}
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-3-haiku-20240307}
  base-url: https://api.anthropic.com

trading:
  auto-execution:
    enabled: ${TRADING_AUTO_EXECUTION_ENABLED:false}
    max-position-percent: ${TRADING_MAX_POSITION_PERCENT:2}
    max-concurrent-positions: ${TRADING_MAX_CONCURRENT_POSITIONS:2}
    daily-loss-limit-percent: ${TRADING_DAILY_LOSS_LIMIT_PERCENT:2}
    require-manual-approval: ${TRADING_REQUIRE_MANUAL_APPROVAL:true}

notifications:
  ntfy:
    enabled: true
    topic: ${NTFY_TOPIC:rsi-alerts}
    server-url: https://ntfy.sh
    priority: high
    
  email:
    enabled: false
    smtp:
      host: ${SMTP_HOST:smtp.gmail.com}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
    to: ${ALERT_EMAIL:}

anomaly:
  enabled: ${ANOMALY_DETECTION_ENABLED:true}
  volume-spike:
    enabled: true
    std-dev-threshold: 8.0
    lookback-periods: 30
    min-periods-before-alert: 20
    cooldown-minutes: 60
    min-baseline-volume: 200
  polymarket:
    enabled: true
    poll-interval-seconds: 300
    odds-shift-threshold-percent: 8
    window-minutes: 30
    markets:
      # Verify/update slugs at polymarket.com — these are examples for the documented patterns
      - slug: will-the-us-strike-iran-in-2025
        name: "US strikes on Iran"
      - slug: will-there-be-a-russia-ukraine-ceasefire-in-2025
        name: "Russia-Ukraine ceasefire"
      - slug: will-north-korea-conduct-a-nuclear-test-in-2025
        name: "North Korea nuclear test"
      - slug: will-the-us-impose-new-tariffs-in-the-next-30-days
        name: "US tariff announcement"

archive:
  enabled: ${ARCHIVE_ENABLED:true}
  dir: ${ARCHIVE_DIR:./signal_archive}
  retention-days: ${ARCHIVE_RETENTION_DAYS:90}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tryItOutEnabled: true

