spring:
  application:
    name: lucid-lynx-market-signals
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/market_signals}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

rsi:
  period: 14
  oversold-threshold: 30
  overbought-threshold: 70
  
  polling:
    interval-seconds: 300
    ig-interval-seconds: 900

  cooldown-minutes: 120
  watch-proximity-threshold: ${WATCH_PROXIMITY_THRESHOLD:40}
  partial-require-fast-tf-aligned: ${PARTIAL_REQUIRE_FAST_TF:true}
  watch-signals:
    enabled: ${WATCH_SIGNALS_ENABLED:false}

  quiet-hours:
    enabled: true
    start-hour: 22
    end-hour: 8
    suppress-partials-on-weekends: true

  market-hours:
    ig-start-utc: 6
    ig-end-utc: 22
    ig-sunday-start-utc: 22

  partial-monitoring:
    enabled: ${PARTIAL_MONITORING_ENABLED:true}
    window-minutes: ${PARTIAL_MONITORING_WINDOW:60}
    follow-up-interval-minutes: ${PARTIAL_MONITORING_INTERVAL:30}
    max-initial-gap: ${PARTIAL_MAX_INITIAL_GAP:8}

  demo:
    account-balance: 10000
    account-currency: EUR
    risk-percent: 1
    # Fixed-pct stops — used as fallback when ATR data insufficient
    stop-percent-crypto: 2.0
    stop-percent-index: 1.0
    stop-percent-commodity: 1.0
    # ATR-based stops — adapts to current volatility (1.5× ATR trend, 2× ATR OB/OS)
    # Sampled on 15m timeframe; falls back to fixed-pct if < period+1 candles available
    atr-stops-enabled: ${ATR_STOPS_ENABLED:true}
    atr-period: ${ATR_PERIOD:14}
    atr-multiplier-trend: ${ATR_MULTIPLIER_TREND:1.5}
    atr-multiplier-default: ${ATR_MULTIPLIER_DEFAULT:2.0}
    # Reward:Risk by asset class (trend signals only; non-trend always uses 2:1)
    # Crypto lowered to 2:1 — SOL 5 wins were all 24h auto-closes, 3:1 target never hit
    trend-rr-crypto: ${TREND_RR_CRYPTO:2.0}
    trend-rr-index: ${TREND_RR_INDEX:3.0}
    trend-rr-commodity: ${TREND_RR_COMMODITY:3.0}
    
  trend:
    ema-period: ${TREND_EMA_PERIOD:20}
    ema-timeframe: ${TREND_EMA_TIMEFRAME:1h}
    consecutive-signals-for-trend: ${TREND_CONSECUTIVE_SIGNALS:2}
    # Apr 24 2026: lowered 60 → 45. At 60, 22 of 22 closed TREND_BUY_DIP trades missed TP
    # because "fast-TF RSI < 60" fires at mere neutral (RSI ~55) — entries land at the
    # top of micro-pullbacks, not real dip bottoms. 45 targets the Investopedia-cited
    # "deep pullback in uptrend" zone. Revisit after 20+ trades.
    dip-rsi-threshold: ${TREND_DIP_RSI_THRESHOLD:45}
    rally-rsi-threshold: ${TREND_RALLY_RSI_THRESHOLD:55}
    trend-timeout-hours: ${TREND_TIMEOUT_HOURS:12}
    suppress-counter-trend: ${TREND_SUPPRESS_COUNTER:true}
    sell-rally-enabled: ${TREND_SELL_RALLY_ENABLED:false}
    # ADX(14) trend-strength filter on the trend timeframe (1h). Skips TREND_BUY_DIP /
    # TREND_SELL_RALLY when the market is ranging (Schwab/Investopedia: ADX<20 = no trend).
    # Set enabled=false to disable; threshold=0 also effectively disables.
    adx-filter-enabled: ${TREND_ADX_FILTER_ENABLED:true}
    adx-period: ${TREND_ADX_PERIOD:14}
    adx-threshold: ${TREND_ADX_THRESHOLD:20.0}
    # Crypto volume confirmation for TREND_BUY_DIP — high volume validates pullbacks per LuxAlgo / r/algotrading.
    # IG CFD volume is unreliable; filter only applies to CRYPTO instruments.
    crypto-volume-filter-enabled: ${TREND_CRYPTO_VOLUME_FILTER_ENABLED:true}
    crypto-volume-multiplier: ${TREND_CRYPTO_VOLUME_MULTIPLIER:1.2}
    crypto-volume-lookback: ${TREND_CRYPTO_VOLUME_LOOKBACK:20}

  correlation:
    lookback-minutes: ${CORRELATION_LOOKBACK_MINUTES:15}
    min-instruments-for-regime: ${CORRELATION_MIN_INSTRUMENTS:3}
    price-change-threshold-pct: ${CORRELATION_PRICE_CHANGE_THRESHOLD:0.5}

  volatility:
    atr-period: ${VOLATILITY_ATR_PERIOD:14}
    atr-lookback: ${VOLATILITY_ATR_LOOKBACK:20}
    expansion-threshold: ${VOLATILITY_EXPANSION_THRESHOLD:1.5}
    min-instruments: ${VOLATILITY_MIN_INSTRUMENTS:2}

  correlation:
    lookback-minutes: ${CORRELATION_LOOKBACK_MINUTES:15}
    min-instruments-for-regime: ${CORRELATION_MIN_INSTRUMENTS:3}
    price-change-threshold-pct: ${CORRELATION_PRICE_CHANGE_THRESHOLD:0.5}

  volatility:
    atr-period: ${VOLATILITY_ATR_PERIOD:14}
    atr-lookback: ${VOLATILITY_ATR_LOOKBACK:20}
    expansion-threshold: ${VOLATILITY_EXPANSION_THRESHOLD:1.5}
    min-instruments: ${VOLATILITY_MIN_INSTRUMENTS:2}

  timeframes:
    - 1m
    - 5m
    - 1h
    - 4h
    - 1d

market:
  binance:
    base-url: https://api.binance.com

  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: https://finnhub.io/api/v1

  ig:
    enabled: ${IG_ENABLED:false}
    api-key: ${IG_API_KEY:}
    username: ${IG_USERNAME:}
    password: ${IG_PASSWORD:}
    base-url: ${IG_BASE_URL:https://demo-api.ig.com/gateway/deal}

claude:
  enabled: ${CLAUDE_ENABLED:false}
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-3-haiku-20240307}
  base-url: https://api.anthropic.com

trading:
  auto-execution:
    enabled: ${TRADING_AUTO_EXECUTION_ENABLED:false}
    max-position-percent: ${TRADING_MAX_POSITION_PERCENT:2}
    max-concurrent-positions: ${TRADING_MAX_CONCURRENT_POSITIONS:2}
    daily-loss-limit-percent: ${TRADING_DAILY_LOSS_LIMIT_PERCENT:2}
    require-manual-approval: ${TRADING_REQUIRE_MANUAL_APPROVAL:true}

notifications:
  telegram:
    enabled: ${TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-ids: ${TELEGRAM_CHAT_IDS:}
    
  email:
    enabled: false
    smtp:
      host: ${SMTP_HOST:smtp.gmail.com}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
    to: ${ALERT_EMAIL:}

anomaly:
  enabled: ${ANOMALY_DETECTION_ENABLED:true}
  volume-spike:
    enabled: true
    std-dev-threshold: 3.0
    lookback-periods: 30
    min-periods-before-alert: 20
    cooldown-minutes: 120
    min-baseline-volume: 200
    # Apr 24 2026: gate Telegram anomaly alerts. Database logging (anomaly_log) is
    # unaffected — only the Telegram push is filtered. Values:
    #   ALL        — alert for every symbol (previous behaviour)
    #   RELEVANT   — alert only if (a) active position on symbol, OR (b) a signal
    #                fired on that symbol within `notify-recent-signal-hours`
    #   OPEN_ONLY  — alert only when there's an active position on the symbol
    notify-scope: ${ANOMALY_NOTIFY_SCOPE:RELEVANT}
    notify-recent-signal-hours: ${ANOMALY_RECENT_SIGNAL_HOURS:4}
  # Cross-correlation burst collapse: when N+ distinct symbols fire anomalies within
  # a short window (macro / news event), suppress the individual alerts after the
  # threshold is hit and emit a single CROSS_CORRELATION alert.
  correlation:
    enabled: ${ANOMALY_CORRELATION_ENABLED:true}
    min-instruments: ${ANOMALY_CORRELATION_MIN_INSTRUMENTS:3}
    window-seconds: ${ANOMALY_CORRELATION_WINDOW_SECONDS:60}
  polymarket:
    enabled: true
    poll-interval-seconds: 300
    odds-shift-threshold-percent: 8
    window-minutes: 30
    # Discovery mode: fetches active markets by tag (recommended — avoids expired markets)
    # Set empty [] to use manual markets list below
    discovery-tags:
      - politics
      - geopolitics
    max-discovery-markets: 10
    excluded-slugs: []  # Markets to ignore from discovery
    # Manual mode: only used if discovery-tags is empty
    # Warning: Prediction markets expire — slugs go stale. Prefer discovery mode.
    markets: []
      # Example (legacy mode):
      # - slug: will-trump-announce-tariffs-on-april-11
      #   name: "Trump tariff announcement"

archive:
  enabled: ${ARCHIVE_ENABLED:true}
  dir: ${ARCHIVE_DIR:./signal_archive}
  retention-days: ${ARCHIVE_RETENTION_DAYS:90}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tryItOutEnabled: true

watchlist:
  instruments:
    - symbol: SOLUSDT
      name: Solana
      source: BINANCE
      enabled: true
      type: CRYPTO
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,1h,4h"
    - symbol: BTCUSDT
      name: Bitcoin
      source: BINANCE
      enabled: true
      type: CRYPTO
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,1h,4h"
      # Re-enabled Apr 22 2026 after R:R dropped to 2:1 (was 3:1 and unreachable).
      # SOL's 5/8 win rate under same setup suggests BTC may also perform.
    - symbol: ETHUSDT
      name: Ethereum
      source: BINANCE
      enabled: true
      type: CRYPTO
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,1h,4h"
      # Re-enabled Apr 22 2026 alongside BTC — same rationale.
    - symbol: BCHUSDT
      name: Bitcoin Cash
      source: BINANCE
      enabled: false
      type: CRYPTO
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,1h,4h"
    # IG instruments — set IG_ENABLED=true and provide IG credentials to activate
    # Find your epic codes at: https://labs.ig.com/sample-apps/api-companion/index.html
    - symbol: IX.D.DAX.DAILY.IP
      name: DAX 40
      source: IG
      enabled: true
      type: INDEX
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,30m,1h"
    - symbol: IX.D.FTSE.DAILY.IP
      name: FTSE 100
      source: IG
      enabled: true
      type: INDEX
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,30m,1h"
      trend-buy-dip-enabled: false  # −0.86R backtest (7 signals, 0% TP, 86% SL)
    - symbol: IX.D.SPTRD.DAILY.IP
      name: S&P 500
      source: IG
      enabled: true
      type: INDEX
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,30m,1h"
      # Apr 22 2026: silent TREND_BUY_DIP — signals still recorded to position_outcomes
      # for forward P&L tracking, but no Telegram alert. Matches the pattern used to evaluate
      # a signal-type on a new instrument without live-alert noise. Flip back to true once
      # ≥20 trades of data show positive expectancy.
      trend-buy-dip-notify: false
    # Gold — verified epic CS.D.USCGC.TODAY.IP (Spot Gold, XAU/USD proxy)
    - symbol: CS.D.USCGC.TODAY.IP
      name: Gold
      source: IG
      enabled: true
      type: COMMODITY
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,1h,4h"
      trend-buy-dip-enabled: false  # −1.00R backtest (6 signals, 0% TP, 100% SL)
    # Oil: FSD (forward) epic expired — switched to USS (cash/rolling) contract
    - symbol: CC.D.LCO.USS.IP
      name: Oil (Brent)
      source: IG
      enabled: true
      type: COMMODITY
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,1h,4h"
      # Re-enabled Apr 2026 for cross-asset correlation detection.
      # Oil spikes often precede index/crypto selloffs.
      # RSI signals on oil alone may be noisy — primary use is as leading indicator.
    - symbol: IX.D.NASDAQ.CASH.IP
      name: Nasdaq 100
      source: IG
      enabled: false
      type: INDEX
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,30m,1h"
    - symbol: CS.D.USCSI.TODAY.IP
      name: Silver
      source: IG
      enabled: false
      type: COMMODITY
      oversold-threshold: 30
      overbought-threshold: 70
      timeframes: "15m,1h,4h"
      trend-buy-dip-enabled: false  # −1.00R backtest (3 signals, 0% TP, 100% SL)
