name: Backup EC2 Data

on:
  schedule:
    # Run every Sunday at 04:00 UTC (1 hour after archival runs at 03:00)
    - cron: '0 4 * * SUN'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual backup'
        required: false
        default: 'Manual trigger'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
          log-public-key: false

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure local directories exist
        run: |
          mkdir -p signal_archive
          mkdir -p reports
          mkdir -p reports/candles

      - name: Pull signal_archive from EC2
        run: |
          echo "📥 Pulling signal_archive from EC2..."
          scp -o StrictHostKeyChecking=accept-new -r ubuntu@${{ secrets.EC2_HOST }}:~/apps/market-signals/signal_archive/* ./signal_archive/ 2>/dev/null || echo "⚠️ signal_archive empty or not yet created on EC2"
          ls -la ./signal_archive/ 2>/dev/null || echo "No local signal_archive files yet"

      - name: Pull reports from EC2
        run: |
          echo "📥 Pulling reports from EC2..."
          scp -o StrictHostKeyChecking=accept-new -r ubuntu@${{ secrets.EC2_HOST }}:~/apps/market-signals/reports/* ./reports/ 2>/dev/null || true
          ls -la ./reports/

      - name: Pull candle_history CSV backup from EC2
        run: |
          echo "📥 Exporting candle_history from EC2 Postgres..."
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.EC2_HOST }} "docker exec market-signals-postgres psql -U postgres -d market_signals -c \"\\copy (SELECT symbol, timeframe, candle_time, open, high, low, close, volume FROM candle_history ORDER BY symbol, timeframe, candle_time) TO STDOUT WITH CSV HEADER\"" > ./reports/candles/candles-ec2-$(date -u +%Y%m%d).csv
          wc -l ./reports/candles/candles-ec2-*.csv
          echo "✅ Candle backup saved"

      - name: Pull live signal_logs CSV from EC2
        run: |
          echo "📥 Exporting full signal_logs from EC2 Postgres..."
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.EC2_HOST }} "docker exec market-signals-postgres psql -U postgres -d market_signals -c \"\\copy (SELECT id, symbol, instrument_name, signal_type, current_price, rsi_1m, rsi_5m, rsi_15m, rsi_30m, rsi_1h, rsi_4h, timeframes_aligned, signal_strength, created_at FROM signal_logs ORDER BY created_at) TO STDOUT WITH CSV HEADER\"" > ./signal_archive/signal_logs_live_$(date -u +%Y%m%d).csv
          wc -l ./signal_archive/signal_logs_live_*.csv
          echo "✅ signal_logs backup saved"

      - name: Pull live position_outcomes CSV from EC2
        run: |
          echo "📥 Exporting full position_outcomes from EC2 Postgres..."
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.EC2_HOST }} "docker exec market-signals-postgres psql -U postgres -d market_signals -c \"\\copy (SELECT id, symbol, signal_type, is_long, entry_time, entry_price, sl_price, tp_price, exit_time, exit_price, tp_hit, sl_hit, pnl_pct, holding_hours, trend_state, rsi_fast, rsi_mid, rsi_slow, stoch_k, stoch_d FROM position_outcomes ORDER BY entry_time) TO STDOUT WITH CSV HEADER\"" > ./signal_archive/position_outcomes_live_$(date -u +%Y%m%d).csv
          wc -l ./signal_archive/position_outcomes_live_*.csv
          echo "✅ position_outcomes backup saved"

      - name: Commit and push if changes exist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage all CSV and report files
          git add signal_archive/ reports/ 2>/dev/null || true
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "✅ No changes to commit - backup is up to date"
            exit 0
          fi
          
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "chore: weekly EC2 data backup - ${DATE}

          - signal_archive: signal logs and position outcomes CSVs
          - reports: P&L reports and generated markdown
          - reports/candles: candle_history export from EC2 Postgres
          
          Auto-generated by backup-ec2-data.yml"
          
          git push
          echo "✅ Backup committed and pushed"

      - name: Summary
        if: always()
        run: |
          echo "=== Backup Summary ==="
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "EC2 Host: ${{ secrets.EC2_HOST }}"
          echo "Local files after backup:"
          find ./signal_archive ./reports -type f -name '*.csv' -o -name '*.md' 2>/dev/null | sort || echo "No files found"
