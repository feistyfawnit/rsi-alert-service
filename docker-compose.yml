version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rsi-postgres
    environment:
      POSTGRES_DB: rsi_alerts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rsi-alert-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/rsi_alerts
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-rsi-alerts}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
