services:
  postgres:
    image: postgres:16-alpine
    container_name: rsi-postgres
    environment:
      POSTGRES_DB: rsi_alerts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rsi-alert-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/rsi_alerts
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      IG_ENABLED: ${IG_ENABLED:-false}
      IG_API_KEY: ${IG_API_KEY:-}
      IG_USERNAME: ${IG_USERNAME:-}
      IG_PASSWORD: ${IG_PASSWORD:-}
      IG_BASE_URL: ${IG_BASE_URL:-https://demo-api.ig.com/gateway/deal}
      CLAUDE_ENABLED: ${CLAUDE_ENABLED:-false}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      TRADING_AUTO_EXECUTION_ENABLED: ${TRADING_AUTO_EXECUTION_ENABLED:-false}
      ANOMALY_DETECTION_ENABLED: "true"
    ports:
      - "8080:8080"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
